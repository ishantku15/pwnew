<!DOCTYPE html>
<html lang="en">
<head><script>window.location.replace('/maintenance.html');</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AS Multiverse — Premium educational streaming platform. Browse thousands of batches, courses, and study materials." />
  <title>Batches — AS Multiverse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="icon" type="image/png" href="https://d2bps9p1kiy4ka.cloudfront.net/5b09189f7285894d9130ccd0/e00a5c58-461c-4c43-a911-d606e00ad53b.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════
       RESET & BASE
    ═══════════════════════════════════════════ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      user-select: none;
      -webkit-user-select: none;
      overflow-x: hidden;
      min-height: 100vh;
    }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; border: none; outline: none; font-family: inherit; }
    input { font-family: inherit; outline: none; border: none; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }

    /* ═══════════════════════════════════════════
       HEADER
    ═══════════════════════════════════════════ */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: #0a0a0a;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 1000;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .header-left { display: flex; align-items: center; }
    .hamburger {
      background: none;
      color: #9ca3af;
      font-size: 22px;
      padding: 6px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .hamburger:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .hamburger svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

    .header-tabs {
      display: flex;
      gap: 0;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }
    .header-tab {
      background: none;
      color: #9ca3af;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.2px;
      padding: 14px 20px;
      position: relative;
      transition: color 0.25s;
      white-space: nowrap;
    }
    .header-tab:hover { color: #fff; }
    .header-tab.active { color: #00d4ff; }
    .header-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 70%;
      height: 2.5px;
      background: #00d4ff;
      border-radius: 2px;
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.5);
    }

    .header-right { display: flex; align-items: center; gap: 8px; }
    .search-toggle {
      background: none;
      color: #9ca3af;
      font-size: 20px;
      padding: 8px;
      border-radius: 10px;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .search-toggle:hover { color: #00d4ff; background: rgba(0, 212, 255, 0.08); }
    .search-toggle svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

    /* ═══════════════════════════════════════════
       BRAND BAR
    ═══════════════════════════════════════════ */
    .brand-bar {
      padding: 12px 20px 0 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #00d4ff, #0088aa);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.5px;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(0, 212, 255, 0.25);
    }
    .brand-text {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #fff;
      background: linear-gradient(135deg, #00d4ff, #0088aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ═══════════════════════════════════════════
       SEARCH OVERLAY
    ═══════════════════════════════════════════ */
    .search-overlay {
      position: fixed;
      top: 52px; left: 0; right: 0;
      background: #0a0a0a;
      border-bottom: 1px solid #1e1e1e;
      z-index: 999;
      padding: 12px 16px;
      transform: translateY(-110%);
      opacity: 0;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s;
    }
    .search-overlay.open {
      transform: translateY(0);
      opacity: 1;
    }
    .search-input-wrap {
      position: relative;
      max-width: 680px;
      margin: 0 auto;
    }
    .search-input {
      width: 100%;
      padding: 12px 44px 12px 16px;
      background: #141414;
      color: #fff;
      border: 1px solid #1e1e1e;
      border-left: 3px solid #00d4ff;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .search-input::placeholder { color: #555; }
    .search-input:focus {
      border-color: rgba(0, 212, 255, 0.4);
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.08);
    }
    .search-clear {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none;
      color: #666;
      font-size: 18px;
      display: none;
      padding: 4px;
      transition: color 0.2s;
    }
    .search-clear.show { display: block; }
    .search-clear:hover { color: #fff; }

    .search-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      left: 0; right: 0;
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 14px;
      max-height: 380px;
      overflow-y: auto;
      display: none;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .search-dropdown.open { display: block; }
    .search-result {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid #1a1a1a;
    }
    .search-result:last-child { border-bottom: none; }
    .search-result:hover { background: #1a1a1a; }
    .search-result img {
      width: 48px; height: 36px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
      background: #1e1e1e;
    }
    .search-result-info { flex: 1; min-width: 0; }
    .search-result-name {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .search-result-name mark {
      background: rgba(0, 212, 255, 0.2);
      color: #00d4ff;
      border-radius: 2px;
      padding: 0 1px;
    }
    .search-result-by {
      font-size: 11px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .search-no-results {
      padding: 30px 14px;
      text-align: center;
      color: #555;
      font-size: 13px;
    }

    /* ═══════════════════════════════════════════
       FILTER BAR
    ═══════════════════════════════════════════ */
    .filter-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 6px 20px;
    }
    .filter-btn {
      display: flex; align-items: center; gap: 6px;
      background: #141414;
      color: #9ca3af;
      border: 1px solid #1e1e1e;
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }
    .filter-btn:hover {
      border-color: rgba(0, 212, 255, 0.3);
      color: #00d4ff;
      background: rgba(0, 212, 255, 0.05);
    }
    .filter-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
    .batch-count {
      font-size: 12px;
      font-weight: 600;
      color: #9ca3af;
      letter-spacing: 0.5px;
    }

    /* ═══════════════════════════════════════════
       MAIN CONTENT AREA
    ═══════════════════════════════════════════ */
    .main-content {
      padding-top: 52px;
      min-height: 100vh;
    }

    /* ═══════════════════════════════════════════
       BATCH GRID
    ═══════════════════════════════════════════ */
    .batch-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      padding: 14px 20px 60px 20px;
    }

    /* ═══════════════════════════════════════════
       BATCH CARD
    ═══════════════════════════════════════════ */
    .batch-card {
      background: #141414;
      border-radius: 16px;
      border: 1px solid #1e1e1e;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.28s cubic-bezier(0.16, 1, 0.3, 1),
                  border-color 0.28s,
                  box-shadow 0.28s;
      position: relative;
    }
    .batch-card:hover {
      transform: translateY(-4px);
      border-color: rgba(0, 212, 255, 0.3);
      box-shadow: 0 12px 40px rgba(0, 212, 255, 0.06), 0 4px 16px rgba(0,0,0,0.3);
    }
    .batch-card:active { transform: translateY(-2px) scale(0.99); }

    .card-thumb-wrap {
      position: relative;
      width: 100%;
      height: 200px;
      overflow: hidden;
      background: #1a1a1a;
    }
    .card-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .batch-card:hover .card-thumb { transform: scale(1.05); }

    .badge-trending {
      position: absolute;
      top: 10px; left: 10px;
      background: #f59e0b;
      color: #000;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 1px;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      box-shadow: 0 2px 8px rgba(245, 158, 11, 0.3);
    }
    .badge-language {
      position: absolute;
      bottom: 10px; left: 10px;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
    }
    .fav-btn {
      position: absolute;
      top: 10px; right: 10px;
      width: 34px; height: 34px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      transition: transform 0.25s, background 0.2s;
      z-index: 2;
    }
    .fav-btn:hover { transform: scale(1.15); background: rgba(0,0,0,0.7); }
    .fav-btn.fav-active { animation: heartPop 0.35s ease; }
    @keyframes heartPop {
      0% { transform: scale(1); }
      40% { transform: scale(1.35); }
      100% { transform: scale(1); }
    }

    .card-info {
      padding: 16px;
    }
    .card-name {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-by {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-dates {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .card-dates span { display: flex; align-items: center; gap: 4px; }
    .date-sep { color: #333; }

    .card-price-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .price-free {
      font-size: 16px;
      font-weight: 800;
      color: #22c55e;
    }
    .price-original {
      font-size: 13px;
      color: #666;
      text-decoration: line-through;
    }
    .price-badge {
      font-size: 10px;
      font-weight: 700;
      background: rgba(34, 197, 94, 0.12);
      color: #22c55e;
      padding: 3px 8px;
      border-radius: 6px;
      letter-spacing: 0.5px;
    }
    .price-paid {
      font-size: 16px;
      font-weight: 800;
      color: #00d4ff;
    }

    .card-actions {
      display: flex;
      gap: 8px;
    }
    .btn-study {
      flex: 1;
      background: #00d4ff;
      color: #000;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 16px;
      border-radius: 10px;
      letter-spacing: 0.5px;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-study:hover { background: #0088aa; color: #fff; box-shadow: 0 4px 16px rgba(0, 212, 255, 0.25); }
    .btn-sub-batches {
      flex: 1;
      background: rgba(0, 212, 255, 0.1);
      color: #00d4ff;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 16px;
      border-radius: 10px;
      letter-spacing: 0.3px;
      transition: all 0.2s;
      border: 1px solid rgba(0, 212, 255, 0.2);
    }
    .btn-sub-batches:hover { background: rgba(0, 212, 255, 0.18); border-color: rgba(0, 212, 255, 0.4); }

    /* ═══════════════════════════════════════════
       SKELETON LOADERS
    ═══════════════════════════════════════════ */
    .skeleton-card {
      background: #141414;
      border-radius: 16px;
      border: 1px solid #1e1e1e;
      overflow: hidden;
    }
    .skeleton-thumb {
      width: 100%;
      height: 200px;
      background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
    }
    .skeleton-info { padding: 16px; }
    .skeleton-line {
      height: 14px;
      background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .skeleton-line.w60 { width: 60%; }
    .skeleton-line.w80 { width: 80%; }
    .skeleton-line.w40 { width: 40%; }
    .skeleton-line.w50 { width: 50%; height: 36px; margin-top: 6px; }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ═══════════════════════════════════════════
       MAHAPACK OVERLAY
    ═══════════════════════════════════════════ */
    .mahapack-overlay {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      z-index: 2000;
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      overflow-y: auto;
    }
    .mahapack-overlay.open { transform: translateX(0); }
    .mahapack-header {
      position: sticky;
      top: 0;
      background: #0a0a0a;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      z-index: 10;
    }
    .mahapack-back {
      background: none;
      color: #9ca3af;
      font-size: 20px;
      padding: 6px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.2s, background 0.2s;
    }
    .mahapack-back:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .mahapack-back svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .mahapack-title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mahapack-search-wrap {
      padding: 12px 16px;
    }
    .mahapack-search {
      width: 100%;
      padding: 10px 14px;
      background: #141414;
      color: #fff;
      border: 1px solid #1e1e1e;
      border-left: 3px solid #00d4ff;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      transition: border-color 0.25s;
    }
    .mahapack-search::placeholder { color: #555; }
    .mahapack-search:focus { border-color: rgba(0, 212, 255, 0.4); }
    .mahapack-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      padding: 8px 16px 40px 16px;
    }
    .mahapack-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: #555;
      font-size: 14px;
    }

    /* ═══════════════════════════════════════════
       SCROLL LOADER
    ═══════════════════════════════════════════ */
    .scroll-loader {
      display: none;
      justify-content: center;
      padding: 30px 0 50px;
    }
    .scroll-loader.active { display: flex; }
    .scroll-dot {
      width: 8px; height: 8px;
      background: #00d4ff;
      border-radius: 50%;
      margin: 0 4px;
      animation: dotPulse 1.2s ease-in-out infinite;
    }
    .scroll-dot:nth-child(2) { animation-delay: 0.15s; }
    .scroll-dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes dotPulse {
      0%, 80%, 100% { transform: scale(0.4); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ═══════════════════════════════════════════
       EMPTY STATE
    ═══════════════════════════════════════════ */
    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      text-align: center;
    }
    .empty-state.show { display: flex; }
    .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    .empty-title { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .empty-desc { font-size: 13px; color: #666; }

    /* ═══════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════ */
    @media (max-width: 768px) {
      .batch-grid, .mahapack-grid {
        grid-template-columns: 1fr;
        padding-left: 12px;
        padding-right: 12px;
        gap: 14px;
      }
      .header-tab { padding: 14px 14px; font-size: 11px; }
      .brand-bar { padding: 10px 14px 0 14px; }
      .filter-bar { padding: 12px 14px 4px 14px; }
      .card-thumb-wrap { height: 180px; }
    }
    @media (max-width: 380px) {
      .header-tab { padding: 14px 10px; font-size: 10px; letter-spacing: 0.8px; }
    }

    /* ═══════════════════════════════════════════
       ANIMATIONS
    ═══════════════════════════════════════════ */
    .fade-up {
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- ─── HEADER ─── -->
  <header class="header" id="header">
    <div class="header-left">
      <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
    <div class="header-tabs">
      <button class="header-tab active" id="tabBatches" data-tab="batches">TOTAL BATCHES</button>
      <button class="header-tab" id="tabFavourites" data-tab="favourites">FAVOURITES ♥</button>
    </div>
    <div class="header-right">
      <button class="search-toggle" id="searchToggle" aria-label="Search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
  </header>

  <!-- ─── SEARCH OVERLAY ─── -->
  <div class="search-overlay" id="searchOverlay">
    <div class="search-input-wrap">
      <input type="text" class="search-input" id="searchInput" placeholder="Search batches..." autocomplete="off" />
      <button class="search-clear" id="searchClear">✕</button>
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>
  </div>

  <!-- ─── MAIN CONTENT ─── -->
  <main class="main-content" id="mainContent">
    <!-- BRAND BAR -->
    <div class="brand-bar">
      <div class="brand-icon">AS</div>
      <span class="brand-text">AS MULTIVERSE</span>
    </div>

    <!-- FILTER BAR -->
    <div class="filter-bar">
      <button class="filter-btn" id="filterBtn">
        <svg viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        FILTER
      </button>
      <span class="batch-count" id="batchCount">📊 — BATCHES</span>
    </div>

    <!-- BATCH GRID -->
    <div class="batch-grid" id="batchGrid"></div>

    <!-- SCROLL LOADER -->
    <div class="scroll-loader" id="scrollLoader">
      <div class="scroll-dot"></div>
      <div class="scroll-dot"></div>
      <div class="scroll-dot"></div>
    </div>

    <!-- EMPTY STATE (for favourites) -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">💙</div>
      <div class="empty-title">No Favourites Yet</div>
      <div class="empty-desc">Tap the heart on any batch to save it here.</div>
    </div>
  </main>

  <!-- ─── MAHAPACK OVERLAY ─── -->
  <div class="mahapack-overlay" id="mahapackOverlay">
    <div class="mahapack-header">
      <button class="mahapack-back" id="mahapackBack">
        <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </button>
      <div class="mahapack-title" id="mahapackTitle"></div>
    </div>
    <div class="mahapack-search-wrap">
      <input type="text" class="mahapack-search" id="mahapackSearch" placeholder="Search sub-batches..." autocomplete="off" />
    </div>
    <div class="mahapack-grid" id="mahapackGrid"></div>
  </div>

  <script>
    /* ═══════════════════════════════════════════
       AUTH HELPERS (for other pages)
    ═══════════════════════════════════════════ */
    function getToken() { return ''; }
    function checkLogin() {
      return true;
    }

    /* ═══════════════════════════════════════════
       STATE
    ═══════════════════════════════════════════ */
    let allBatches = [];
    let displayedCount = 0;
    const BATCH_SIZE = 12;
    let currentTab = 'batches';
    let isLoading = false;
    let searchOpen = false;

    /* ═══════════════════════════════════════════
       FAVOURITES
    ═══════════════════════════════════════════ */
    function getFavourites() {
      try { return JSON.parse(localStorage.getItem('as_favourites')) || []; }
      catch { return []; }
    }
    function setFavourites(arr) {
      localStorage.setItem('as_favourites', JSON.stringify(arr));
    }
    function isFav(id) { return getFavourites().includes(id); }
    function toggleFav(id) {
      const favs = getFavourites();
      const idx = favs.indexOf(id);
      if (idx > -1) favs.splice(idx, 1);
      else favs.push(id);
      setFavourites(favs);
      return favs.includes(id);
    }

    /* ═══════════════════════════════════════════
       DATE FORMATTER
    ═══════════════════════════════════════════ */
    function fmtDate(d) {
      if (!d) return '—';
      const dt = new Date(d);
      if (isNaN(dt)) return '—';
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return `${String(dt.getDate()).padStart(2,'0')} ${months[dt.getMonth()]} ${dt.getFullYear()}`;
    }

    /* ═══════════════════════════════════════════
       CARD BUILDER
    ═══════════════════════════════════════════ */
    function buildCard(b, animDelay = 0) {
      const isMaha = (b.type || '').toLowerCase().includes('mahapack') ||
                     (Array.isArray(b.subBatches) && b.subBatches.length > 0);
      const favd = isFav(b._id);
      const isFree = !b.feeTotal || b.feeTotal === 0;
      const lang = (b.language || 'Hinglish').toUpperCase();

      const card = document.createElement('div');
      card.className = 'batch-card fade-up';
      card.style.animationDelay = `${animDelay}ms`;
      card.dataset.id = b._id;

      card.innerHTML = `
        <div class="card-thumb-wrap">
          <img class="card-thumb" src="${b.previewImage || ''}" alt="${esc(b.name)}" loading="lazy" onerror="this.style.display='none'" />
          <div class="badge-trending">🔥 TRENDING</div>
          <div class="badge-language">${lang}</div>
          <button class="fav-btn ${favd ? 'fav-active' : ''}" data-id="${b._id}" aria-label="Favourite">${favd ? '❤️' : '🤍'}</button>
        </div>
        <div class="card-info">
          <div class="card-name">${esc(b.name)}</div>
          <div class="card-by">${esc(b.byName || '')}</div>
          <div class="card-dates">
            <span>📅 Starts: ${fmtDate(b.startDate)}</span>
            <span class="date-sep">|</span>
            <span>Ends: ${fmtDate(b.endDate)}</span>
          </div>
          <div class="card-price-row">
            ${isFree
              ? `<span class="price-free">FREE</span>
                 ${b.feeTotal > 0 ? `<span class="price-original">₹${b.feeTotal}</span>` : ''}
                 <span class="price-badge">100% FREE</span>`
              : `<span class="price-paid">₹${b.feeTotal?.toLocaleString('en-IN') || '0'}</span>`
            }
          </div>
          <div class="card-actions">
            ${isMaha
              ? `<button class="btn-sub-batches" data-id="${b._id}">📂 View Sub-Batches</button>`
              : `<button class="btn-study" data-id="${b._id}" data-name="${esc(b.name)}">📖 STUDY →</button>`
            }
          </div>
        </div>`;

      // Fav button click
      const favBtn = card.querySelector('.fav-btn');
      favBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const nowFav = toggleFav(b._id);
        favBtn.textContent = nowFav ? '❤️' : '🤍';
        favBtn.classList.toggle('fav-active', nowFav);
        if (currentTab === 'favourites') {
          card.style.transition = 'opacity 0.3s, transform 0.3s';
          card.style.opacity = '0';
          card.style.transform = 'scale(0.95)';
          setTimeout(() => { card.remove(); checkEmptyFavs(); }, 300);
        }
      });

      // Card body click
      card.addEventListener('click', (e) => {
        if (e.target.closest('.fav-btn')) return;
        if (isMaha) {
          openMahapack(b);
        } else {
          window.location.href = `/subjects.html?batchId=${encodeURIComponent(b._id)}&batchName=${encodeURIComponent(b.name)}`;
        }
      });

      return card;
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    /* ═══════════════════════════════════════════
       SKELETON LOADERS
    ═══════════════════════════════════════════ */
    function showSkeletons(count = 12) {
      const grid = document.getElementById('batchGrid');
      grid.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const sk = document.createElement('div');
        sk.className = 'skeleton-card';
        sk.innerHTML = `
          <div class="skeleton-thumb"></div>
          <div class="skeleton-info">
            <div class="skeleton-line w80"></div>
            <div class="skeleton-line w60"></div>
            <div class="skeleton-line w40"></div>
            <div class="skeleton-line w50"></div>
          </div>`;
        grid.appendChild(sk);
      }
    }

    /* ═══════════════════════════════════════════
       RENDER
    ═══════════════════════════════════════════ */
    function getVisibleBatches() {
      if (currentTab === 'favourites') {
        const favs = getFavourites();
        return allBatches.filter(b => favs.includes(b._id));
      }
      return allBatches;
    }

    function renderBatch(startIdx) {
      const grid = document.getElementById('batchGrid');
      const batches = getVisibleBatches();
      const end = Math.min(startIdx + BATCH_SIZE, batches.length);
      for (let i = startIdx; i < end; i++) {
        const delay = (i - startIdx) * 40;
        grid.appendChild(buildCard(batches[i], delay));
      }
      displayedCount = end;
      updateBatchCount();
      updateScrollLoader();
    }

    function fullRender() {
      const grid = document.getElementById('batchGrid');
      grid.innerHTML = '';
      displayedCount = 0;
      const batches = getVisibleBatches();
      if (currentTab === 'favourites' && batches.length === 0) {
        document.getElementById('emptyState').classList.add('show');
        document.getElementById('scrollLoader').classList.remove('active');
        updateBatchCount();
        return;
      }
      document.getElementById('emptyState').classList.remove('show');
      renderBatch(0);
    }

    function checkEmptyFavs() {
      const grid = document.getElementById('batchGrid');
      if (currentTab === 'favourites' && grid.children.length === 0) {
        document.getElementById('emptyState').classList.add('show');
      }
      updateBatchCount();
    }

    function updateBatchCount() {
      const batches = getVisibleBatches();
      document.getElementById('batchCount').textContent = `📊 ${batches.length.toLocaleString()} BATCHES`;
    }

    function updateScrollLoader() {
      const batches = getVisibleBatches();
      const loader = document.getElementById('scrollLoader');
      if (displayedCount < batches.length) {
        loader.classList.add('active');
      } else {
        loader.classList.remove('active');
      }
    }

    /* ═══════════════════════════════════════════
       TAB SWITCHING
    ═══════════════════════════════════════════ */
    document.getElementById('tabBatches').addEventListener('click', () => switchTab('batches'));
    document.getElementById('tabFavourites').addEventListener('click', () => switchTab('favourites'));

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.header-tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      document.getElementById('emptyState').classList.remove('show');
      fullRender();
    }

    /* ═══════════════════════════════════════════
       INFINITE SCROLL
    ═══════════════════════════════════════════ */
    function onScroll() {
      if (isLoading) return;
      const batches = getVisibleBatches();
      if (displayedCount >= batches.length) return;
      const scrollY = window.scrollY + window.innerHeight;
      const docH = document.documentElement.scrollHeight;
      if (scrollY >= docH - 400) {
        renderBatch(displayedCount);
      }
    }
    window.addEventListener('scroll', onScroll, { passive: true });

    /* ═══════════════════════════════════════════
       SEARCH
    ═══════════════════════════════════════════ */
    const searchToggle = document.getElementById('searchToggle');
    const searchOverlay = document.getElementById('searchOverlay');
    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');
    const searchDropdown = document.getElementById('searchDropdown');

    searchToggle.addEventListener('click', () => {
      searchOpen = !searchOpen;
      searchOverlay.classList.toggle('open', searchOpen);
      if (searchOpen) {
        setTimeout(() => searchInput.focus(), 350);
      } else {
        searchInput.value = '';
        searchDropdown.classList.remove('open');
        searchClear.classList.remove('show');
      }
    });

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchDropdown.classList.remove('open');
      searchClear.classList.remove('show');
      searchInput.focus();
    });

    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      searchClear.classList.toggle('show', q.length > 0);
      if (q.length < 2) {
        searchDropdown.classList.remove('open');
        return;
      }
      const results = allBatches.filter(b => fuzzyMatch(b.name, q)).slice(0, 15);
      if (results.length === 0) {
        searchDropdown.innerHTML = '<div class="search-no-results">No results found</div>';
      } else {
        searchDropdown.innerHTML = results.map(b => {
          const highlighted = highlightMatch(esc(b.name), q);
          return `<div class="search-result" data-id="${b._id}" data-name="${esc(b.name)}" data-type="${b.type || ''}">
            <img src="${b.previewImage || ''}" alt="" onerror="this.style.visibility='hidden'" />
            <div class="search-result-info">
              <div class="search-result-name">${highlighted}</div>
              <div class="search-result-by">${esc(b.byName || '')}</div>
            </div>
          </div>`;
        }).join('');
      }
      searchDropdown.classList.add('open');
    });

    searchDropdown.addEventListener('click', (e) => {
      const item = e.target.closest('.search-result');
      if (!item) return;
      const id = item.dataset.id;
      const name = item.dataset.name;
      const batch = allBatches.find(b => b._id === id);
      const isMaha = batch && ((batch.type || '').toLowerCase().includes('mahapack') ||
                     (Array.isArray(batch.subBatches) && batch.subBatches.length > 0));
      if (isMaha) {
        searchOpen = false;
        searchOverlay.classList.remove('open');
        openMahapack(batch);
      } else {
        window.location.href = `/subjects.html?batchId=${encodeURIComponent(id)}&batchName=${encodeURIComponent(name)}`;
      }
    });

    function fuzzyMatch(text, query) {
      const t = text.toLowerCase();
      let qi = 0;
      for (let i = 0; i < t.length && qi < query.length; i++) {
        if (t[i] === query[qi]) qi++;
      }
      return qi === query.length;
    }

    function highlightMatch(text, query) {
      const lower = text.toLowerCase();
      let result = '';
      let qi = 0;
      for (let i = 0; i < text.length; i++) {
        if (qi < query.length && lower[i] === query[qi]) {
          result += `<mark>${text[i]}</mark>`;
          qi++;
        } else {
          result += text[i];
        }
      }
      return result;
    }

    // Close search on click outside
    document.addEventListener('click', (e) => {
      if (searchOpen && !e.target.closest('.search-overlay') && !e.target.closest('#searchToggle')) {
        searchOpen = false;
        searchOverlay.classList.remove('open');
        searchInput.value = '';
        searchDropdown.classList.remove('open');
        searchClear.classList.remove('show');
      }
    });

    /* ═══════════════════════════════════════════
       MAHAPACK
    ═══════════════════════════════════════════ */
    const mahapackOverlay = document.getElementById('mahapackOverlay');
    const mahapackBack = document.getElementById('mahapackBack');
    const mahapackTitle = document.getElementById('mahapackTitle');
    const mahapackSearch = document.getElementById('mahapackSearch');
    const mahapackGrid = document.getElementById('mahapackGrid');
    let currentMahapack = null;

    function openMahapack(batch) {
      currentMahapack = batch;
      mahapackTitle.textContent = batch.name;
      mahapackSearch.value = '';
      renderMahapackSubs(batch.subBatches || []);
      mahapackOverlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeMahapack() {
      mahapackOverlay.classList.remove('open');
      document.body.style.overflow = '';
      currentMahapack = null;
    }

    mahapackBack.addEventListener('click', closeMahapack);

    function renderMahapackSubs(subs) {
      mahapackGrid.innerHTML = '';
      if (subs.length === 0) {
        mahapackGrid.innerHTML = '<div class="mahapack-empty">No sub-batches available</div>';
        return;
      }
      subs.forEach((sb, i) => {
        const card = buildCard(sb, i * 40);
        // Override click to navigate to subjects
        card.onclick = (e) => {
          if (e.target.closest('.fav-btn')) return;
          window.location.href = `/subjects.html?batchId=${encodeURIComponent(sb._id)}&batchName=${encodeURIComponent(sb.name)}`;
        };
        mahapackGrid.appendChild(card);
      });
    }

    mahapackSearch.addEventListener('input', () => {
      if (!currentMahapack) return;
      const q = mahapackSearch.value.trim().toLowerCase();
      const subs = (currentMahapack.subBatches || []).filter(sb =>
        !q || fuzzyMatch(sb.name, q)
      );
      renderMahapackSubs(subs);
    });

    /* ═══════════════════════════════════════════
       FETCH DATA
    ═══════════════════════════════════════════ */
    async function loadBatches() {
      showSkeletons(12);
      isLoading = true;
      try {
        const res = await fetch('https://rarestudy.github.io/rarestudy/batches.json');
        if (!res.ok) throw new Error('Network error');
        const data = await res.json();
        if (data.success && Array.isArray(data.batches)) {
          allBatches = data.batches;
        } else if (Array.isArray(data)) {
          allBatches = data;
        }
      } catch (err) {
        console.error('Failed to load batches:', err);
        allBatches = [];
      }
      isLoading = false;
      fullRender();
    }

    /* ═══════════════════════════════════════════
       INIT
    ═══════════════════════════════════════════ */
    loadBatches();
  </script>
</body>
</html>
