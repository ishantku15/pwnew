<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Subjects — AS Multiverse</title>
<link rel="icon" type="image/png" href="https://d2bps9p1kiy4ka.cloudfront.net/5b09189f7285894d9130ccd0/e00a5c58-461c-4c43-a911-d606e00ad53b.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;outline:none;-webkit-tap-highlight-color:transparent;user-select:none}
body,html{min-height:100%;font-family:'Inter',sans-serif;background:#0a0a0a;color:#fff;overflow-x:hidden}

/* ── Header ── */
.header{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(10,10,10,0.97);display:flex;align-items:center;padding:0 16px;z-index:1000;border-bottom:1px solid #1e1e1e;backdrop-filter:blur(12px)}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,0.6),transparent)}
.back-btn{display:flex;align-items:center;gap:10px;color:#fff;text-decoration:none;font-weight:700;font-size:15px;cursor:pointer;padding:8px 0;min-width:0;flex:1}
.back-btn svg{width:22px;height:22px;stroke:#00d4ff;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.header-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:16px;font-weight:800}

/* ── Schedule Section ── */
.schedule-section{padding:72px 0 0}
.sec-head{font-size:14px;font-weight:800;padding:12px 16px 8px;display:flex;align-items:center;gap:8px;color:#fff;letter-spacing:0.3px}
.sec-head::before{content:'';width:4px;height:16px;background:linear-gradient(to bottom,#00d4ff,#818cf8);border-radius:4px;flex-shrink:0}
.schedule-scroll{display:flex;gap:12px;overflow-x:auto;padding:0 16px 12px;scrollbar-width:none}
.schedule-scroll::-webkit-scrollbar{display:none}
.schedule-divider{height:1px;background:#1e1e1e;margin:0 16px}

/* Live Class Card */
.schedule-card{min-width:200px;width:200px;background:#141414;border:1px solid #1e1e1e;border-radius:16px;overflow:hidden;text-decoration:none;color:#fff;display:block;transition:border-color 0.2s,transform 0.15s;flex-shrink:0}
.schedule-card:active{transform:scale(0.97)}
.schedule-card.is-live{border-color:rgba(239,68,68,0.5);box-shadow:0 0 12px rgba(239,68,68,0.15)}
.schedule-card.is-upcoming{border-color:rgba(0,212,255,0.3)}
.sched-thumb{height:100px;background:#1a1a1a url('https://study-mf.pw.live/static/image/teacherbg.807b2b2f.png') center/cover;position:relative;overflow:hidden}
.sched-thumb img{width:100%;height:100%;object-fit:cover;object-position:top center}
.sched-tag{position:absolute;top:8px;left:8px;font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px;letter-spacing:0.5px}
.tag-live{background:rgba(239,68,68,0.95);color:#fff;animation:pulse 2s infinite}
.tag-upcoming{background:rgba(0,212,255,0.95);color:#0a0a0a}
.tag-ended{background:rgba(100,116,139,0.9);color:#fff}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(239,68,68,0.5)}70%{box-shadow:0 0 0 6px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}
.sched-info{padding:10px 12px}
.sched-time{font-size:11px;color:#00d4ff;font-weight:700;margin-bottom:3px}
.sched-topic{font-size:12px;font-weight:700;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px}
.sched-teacher{font-size:11px;color:#9ca3af;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Tabs ── */
.tabs-container{position:sticky;top:56px;background:rgba(10,10,10,0.97);z-index:900;padding:10px 16px;backdrop-filter:blur(12px);border-bottom:1px solid #1e1e1e}
.tabs-scroll{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.tabs-scroll::-webkit-scrollbar{display:none}
.tab-btn{padding:7px 18px;border-radius:20px;font-size:13px;font-weight:700;color:#9ca3af;background:transparent;border:1px solid #2a2a2a;cursor:pointer;white-space:nowrap;transition:all 0.2s;font-family:'Inter',sans-serif}
.tab-btn.active{background:#00d4ff;color:#0a0a0a;border-color:#00d4ff}

/* ── Panels ── */
.panel{display:none;padding:12px 16px 80px}
.panel.active{display:block}

/* ── Subjects Grid ── */
.subjects-grid{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:600px){.subjects-grid{grid-template-columns:1fr 1fr}}
@media(min-width:900px){.subjects-grid{grid-template-columns:1fr 1fr 1fr}}

.subject-card{background:#141414;border:1px solid rgba(0,212,255,0.15);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px;text-decoration:none;color:#fff;transition:all 0.2s;min-height:64px}
.subject-card:active{transform:scale(0.98);background:#1a1a1a}
.subject-card:hover{border-color:rgba(0,212,255,0.4);background:#181818}
.sub-icon{width:38px;height:38px;background:linear-gradient(135deg,rgba(0,212,255,0.15),rgba(129,140,248,0.1));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:1px solid rgba(0,212,255,0.1)}
.sub-name{flex:1;font-size:14px;font-weight:700;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.sub-arrow svg{width:18px;height:18px;stroke:#00d4ff;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:0.7;flex-shrink:0}

/* ── Announcements ── */
.ann-list{display:flex;flex-direction:column;gap:10px}
.ann-card{background:#141414;border-radius:14px;border:1px solid #1e1e1e;padding:14px 16px}
.ann-date{font-size:11px;color:#00d4ff;font-weight:700;margin-bottom:6px}
.ann-text{font-size:13px;line-height:1.6;color:#e2e8f0}
.ann-img{width:100%;border-radius:10px;margin-top:10px}

/* ── Skeletons ── */
.skel{background:linear-gradient(90deg,#141414 25%,#1e1e1e 50%,#141414 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:14px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── Tests ── */
.test-filters{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px;padding-bottom:4px;scrollbar-width:none}
.test-filters::-webkit-scrollbar{display:none}
.filter-btn{padding:6px 14px;background:#141414;border:1px solid #1e1e1e;border-radius:16px;color:#9ca3af;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;transition:all 0.2s}
.filter-btn.active{background:rgba(0,212,255,0.1);border-color:#00d4ff;color:#00d4ff}
.test-card{background:#141414;border:1px solid #1e1e1e;border-radius:14px;padding:16px;margin-bottom:10px}
.test-title{font-size:14px;font-weight:700;margin-bottom:8px;line-height:1.4}
.test-meta{display:flex;gap:10px;font-size:12px;color:#9ca3af;margin-bottom:12px;flex-wrap:wrap}
.test-btn{background:#00d4ff;color:#0a0a0a;border:none;border-radius:10px;padding:10px;font-weight:700;width:100%;cursor:pointer;font-family:'Inter',sans-serif;font-size:14px}

/* ── Empty / Error ── */
.empty-state{text-align:center;padding:48px 20px;color:#4b5563;font-size:14px}
.empty-state .icon{font-size:40px;margin-bottom:12px;opacity:0.5}
</style>
</head>
<body>

<div class="header">
    <a href="/index.html" class="back-btn">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        <span class="header-title" id="headerTitle">Subjects</span>
    </a>
</div>

<!-- Today's Schedule -->
<div class="schedule-section">
    <div id="scheduleSection" style="display:none">
        <div class="sec-head">🔴 Today's Live Classes</div>
        <div class="schedule-scroll" id="scheduleList"></div>
        <div class="schedule-divider"></div>
    </div>
</div>

<!-- Tabs -->
<div class="tabs-container">
    <div class="tabs-scroll">
        <button class="tab-btn active" data-tab="subjects" onclick="switchTab('subjects',this)">All Classes</button>
        <button class="tab-btn" data-tab="tests" onclick="switchTab('tests',this)">Tests</button>
        <button class="tab-btn" data-tab="announcements" onclick="switchTab('announcements',this)">Announcements</button>
    </div>
</div>

<!-- Subjects Panel -->
<div id="panel-subjects" class="panel active">
    <div class="subjects-grid" id="subjectsGrid">
        <div class="skel" style="height:64px"></div>
        <div class="skel" style="height:64px"></div>
        <div class="skel" style="height:64px"></div>
        <div class="skel" style="height:64px"></div>
    </div>
</div>

<!-- Tests Panel -->
<div id="panel-tests" class="panel">
    <div class="test-filters" id="testFilters"></div>
    <div id="testsList"></div>
</div>

<!-- Announcements Panel -->
<div id="panel-announcements" class="panel">
    <div class="ann-list" id="annList"></div>
    <div id="annLoadSkel" style="display:none"><div class="skel" style="height:100px;margin-bottom:10px"></div></div>
</div>

<script src="config.js"></script>
<script>
const QS = new URLSearchParams(location.search);
const BATCH_ID  = QS.get('batchId')   || '';
const BATCH_NAME = QS.get('batchName') || '';

if(!BATCH_ID) window.location.href = '/index.html';

document.title = (BATCH_NAME || 'Subjects') + ' — AS Multiverse';
document.getElementById('headerTitle').textContent = BATCH_NAME || 'Subjects';

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function ep(s){return encodeURIComponent(s||'')}

/* Parse timestamp — handles both ISO strings and Unix ms/s */
function parseTime(val) {
    if(!val) return NaN;
    const n = Number(val);
    if(!isNaN(n)) {
        // unix seconds → ms
        return n < 1e12 ? n * 1000 : n;
    }
    return new Date(val).getTime();
}

function fmtTime(val) {
    const ms = parseTime(val);
    if(isNaN(ms)) return '—';
    return new Date(ms).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

const state = {
    ann: { page:1, loading:false, done:false, loaded:false },
    tests: { loaded:false }
};

/* ── Subjects ── */
async function loadSubjects() {
    const data = await pw(`https://api.penpencil.co/v3/batches/${BATCH_ID}/details`);
    const grid = document.getElementById('subjectsGrid');

    if(!data?.data?.subjects?.length) {
        grid.innerHTML = '<div class="empty-state"><div class="icon">📭</div>No subjects available</div>';
        return;
    }

    const subjectIcons = ['📖','🔬','⚗️','🧮','🌿','🔭','📐','🧲','💡','📝'];
    grid.innerHTML = '';
    data.data.subjects.forEach((sub, i) => {
        const a = document.createElement('a');
        a.className = 'subject-card';
        a.href = `/content.html?batchId=${ep(BATCH_ID)}&subjectId=${ep(sub._id)}&batchName=${ep(BATCH_NAME)}&subjectName=${ep(sub.subject)}`;
        a.innerHTML = `
            <div class="sub-icon">${subjectIcons[i % subjectIcons.length]}</div>
            <div class="sub-name">${esc(sub.subject)}</div>
            <div class="sub-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
        `;
        grid.appendChild(a);
    });
}

/* ── Schedule (Live Classes) ── */
async function loadSchedule() {
    const data = await pw(`https://api.penpencil.co/v2/batches/${BATCH_ID}/todays-schedule`);
    if(!data?.data?.length) return;

    const items = data.data;

    /* Fetch teacher details */
    const tIds = [...new Set(items.map(i => i.facultyId).filter(Boolean))];
    let tMap = {};
    if(tIds.length) {
        const tData = await pw(`https://api.penpencil.co/v1/users/get-user-details-list?userIds=${tIds.join(',')}`);
        if(tData?.data) tData.data.forEach(t => tMap[t._id] = t);
    }

    document.getElementById('scheduleSection').style.display = 'block';
    const list = document.getElementById('scheduleList');

    items.forEach(item => {
        const t = tMap[item.facultyId] || {};
        const img = t.imageId ? (t.imageId.baseUrl + t.imageId.key) : '';
        const name = `${t.firstName||''} ${t.lastName||''}`.trim() || (item.facultyName || 'Faculty');

        const now   = Date.now();
        const start = parseTime(item.startTime);
        const end   = parseTime(item.endTime);

        let tag = 'UPCOMING', tagCls = 'tag-upcoming', cardCls = 'is-upcoming';
        if(!isNaN(start) && !isNaN(end)) {
            if(now >= start && now <= end)  { tag = '🔴 LIVE';  tagCls = 'tag-live';   cardCls = 'is-live'; }
            else if(now > end)              { tag = 'ENDED';    tagCls = 'tag-ended';  cardCls = 'is-ended'; }
        }

        const timeStr = fmtTime(item.startTime);
        const subject = item.subject || item.subjectName || '';
        const topic   = item.topic   || item.topicName   || 'Class';

        const a = document.createElement('a');
        a.className = `schedule-card ${cardCls}`;
        /* clicking a live card opens stream.testuk.org */
        a.href = `https://stream.testuk.org/schedule-details?batchId=${ep(BATCH_ID)}&subjectId=${ep(item.subjectId)}&scheduleId=${ep(item._id)}&tap=video`;
        a.target = '_blank';

        a.innerHTML = `
            <div class="sched-thumb">
                ${img ? `<img src="${img}" alt="${esc(name)}" onerror="this.remove()">` : ''}
                <span class="sched-tag ${tagCls}">${tag}</span>
            </div>
            <div class="sched-info">
                <div class="sched-time">🕒 ${timeStr}${subject ? ' · ' + esc(subject) : ''}</div>
                <div class="sched-topic">${esc(topic)}</div>
                <div class="sched-teacher">By ${esc(name)}</div>
            </div>
        `;
        list.appendChild(a);
    });
}

/* ── Announcements ── */
async function loadAnnouncements() {
    if(state.ann.loading || state.ann.done) return;
    state.ann.loading = true;
    const lsk = document.getElementById('annLoadSkel');
    lsk.style.display = 'block';

    const data = await pw(`https://api.penpencil.co/v1/batches/${BATCH_ID}/announcement?page=${state.ann.page}`);
    lsk.style.display = 'none';
    state.ann.loaded = true;

    const list = document.getElementById('annList');
    if(!data?.data?.length) {
        state.ann.done = true;
        if(state.ann.page === 1) list.innerHTML = '<div class="empty-state"><div class="icon">📢</div>No announcements yet</div>';
        return;
    }

    data.data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'ann-card';
        const d = new Date(parseTime(item.createdAt));
        const dateStr = isNaN(d) ? '' : d.toLocaleDateString('en-GB') + ' ' + d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
        let html = dateStr ? `<div class="ann-date">${dateStr}</div>` : '';
        if(item.description) html += `<div class="ann-text">${item.description.replace(/\n/g,'<br>')}</div>`;
        if(item.image) html += `<img src="${item.image}" class="ann-img" loading="lazy">`;
        div.innerHTML = html;
        list.appendChild(div);
    });

    if(data.data.length < 10) state.ann.done = true;
    else { state.ann.page++; state.ann.loading = false; }
}

/* ── Tests ── */
async function loadTests() {
    if(state.tests.loaded) return;
    const fContainer = document.getElementById('testFilters');
    const tList = document.getElementById('testsList');
    tList.innerHTML = '<div class="skel" style="height:120px;margin-bottom:10px"></div>'.repeat(3);

    const filtersRes = await pw(`https://api.penpencil.co/v3/test-service/tests/filters?batchId=${BATCH_ID}`);
    state.tests.loaded = true;

    if(!filtersRes?.data?.categorySection?.length) {
        fContainer.style.display = 'none';
        tList.innerHTML = '<div class="empty-state"><div class="icon">📋</div>No tests available</div>';
        return;
    }

    filtersRes.data.categorySection.forEach((cat, idx) => {
        const btn = document.createElement('button');
        btn.className = `filter-btn ${idx===0?'active':''}`;
        btn.textContent = cat.name;
        btn.onclick = () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fetchTestList(cat._id);
        };
        fContainer.appendChild(btn);
        if(idx === 0) fetchTestList(cat._id);
    });
}

async function fetchTestList(catId) {
    const tList = document.getElementById('testsList');
    tList.innerHTML = '<div class="skel" style="height:120px;margin-bottom:10px"></div>'.repeat(3);
    const data = await pw(`https://api.penpencil.co/v3/test-service/tests?categorySectionId=${catId}&batchId=${BATCH_ID}`);

    if(!data?.data?.length) {
        tList.innerHTML = '<div class="empty-state"><div class="icon">📋</div>No tests in this section</div>';
        return;
    }
    tList.innerHTML = '';
    data.data.forEach(test => {
        const div = document.createElement('div');
        div.className = 'test-card';
        div.innerHTML = `
            <div class="test-title">${esc(test.name)}</div>
            <div class="test-meta">
                <span>📋 ${test.totalQuestions||0} Qs</span>
                <span>⏱️ ${test.maxDuration||0} Mins</span>
                <span>⭐ ${test.totalMarks||0} Marks</span>
            </div>
            <button class="test-btn" onclick="alert('Test platform coming soon!')">View Test</button>
        `;
        tList.appendChild(div);
    });
}

/* ── Tab Switching ── */
function switchTab(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    if(tab === 'announcements' && !state.ann.loaded) loadAnnouncements();
    if(tab === 'tests' && !state.tests.loaded) loadTests();
}

/* ── Infinite scroll for announcements ── */
window.addEventListener('scroll', () => {
    if(document.getElementById('panel-announcements').classList.contains('active')) {
        if(window.scrollY + window.innerHeight >= document.documentElement.scrollHeight - 150) {
            loadAnnouncements();
        }
    }
});

/* ── Init ── */
(async function() {
    loadSchedule();
    await loadSubjects();
})();
</script>
</body>
</html>
