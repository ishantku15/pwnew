<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Subjects — AS Multiverse</title>
<link rel="icon" type="image/png" href="https://d2bps9p1kiy4ka.cloudfront.net/5b09189f7285894d9130ccd0/e00a5c58-461c-4c43-a911-d606e00ad53b.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;outline:none;-webkit-tap-highlight-color:transparent;user-select:none}
body,html{min-height:100%;font-family:'Inter',sans-serif;background:#080810;color:#fff;overflow-x:hidden}

/* ── Header ── */
.header{position:fixed;top:0;left:0;right:0;height:58px;background:rgba(8,8,16,0.92);display:flex;align-items:center;padding:0 16px;z-index:1000;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.header-line{position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,rgba(0,212,255,0.6) 30%,rgba(129,140,248,0.6) 70%,transparent 100%)}
.back-btn{display:flex;align-items:center;gap:10px;color:#fff;text-decoration:none;font-weight:700;cursor:pointer;padding:10px 0;flex:1;min-width:0}
.back-icon{width:36px;height:36px;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.back-icon svg{width:18px;height:18px;stroke:#00d4ff;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
.header-title{font-size:16px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:linear-gradient(90deg,#fff,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* ── Page wrap ── */
.page{padding-top:58px}

/* ── Live Section ── */
.live-section{display:none;background:linear-gradient(180deg,rgba(239,68,68,0.06) 0%,transparent 100%);padding-bottom:4px}
.sec-label{font-size:12px;font-weight:800;padding:14px 16px 10px;display:flex;align-items:center;gap:8px;letter-spacing:0.8px;text-transform:uppercase;color:#ef4444}
.live-dot{width:8px;height:8px;background:#ef4444;border-radius:50%;flex-shrink:0;animation:livepulse 1.4s infinite}
@keyframes livepulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.7)}}

.sched-scroll{display:flex;gap:10px;overflow-x:auto;padding:0 16px 16px;scrollbar-width:none}
.sched-scroll::-webkit-scrollbar{display:none}

.sched-card{min-width:185px;width:185px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;overflow:hidden;text-decoration:none;color:#fff;flex-shrink:0;display:block;transition:transform 0.15s,box-shadow 0.2s}
.sched-card:active{transform:scale(0.95)}
.sched-card.live{border-color:rgba(239,68,68,0.4);background:rgba(239,68,68,0.05);box-shadow:0 0 20px rgba(239,68,68,0.12)}
.sched-card.upcoming{border-color:rgba(0,212,255,0.2);background:rgba(0,212,255,0.03)}

.sched-thumb{height:100px;background:#131320 url('https://study-mf.pw.live/static/image/teacherbg.807b2b2f.png') center/cover;position:relative;overflow:hidden}
.sched-thumb img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
.sched-thumb-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,8,16,0.8) 0%,transparent 60%)}
.sched-badge{position:absolute;top:8px;left:8px;font-size:9px;font-weight:800;padding:3px 8px;border-radius:20px;letter-spacing:0.6px;text-transform:uppercase}
.badge-live{background:#ef4444;color:#fff;animation:pulse 2s infinite}
.badge-upcoming{background:#00d4ff;color:#0a0a0a}
.badge-ended{background:rgba(100,116,139,0.9);color:#fff}
.sched-time-pill{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);font-size:10px;font-weight:700;color:#fff;padding:2px 8px;border-radius:20px}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(239,68,68,0.6)}70%{box-shadow:0 0 0 8px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}

.sched-info{padding:8px 10px 10px}
.sched-subject{font-size:10px;color:#00d4ff;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:0.2px}
.sched-topic{font-size:11px;font-weight:700;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px;color:#e2e8f0}
.sched-teacher{font-size:10px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.section-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);margin:0}

/* ── Tabs ── */
.tabs-wrap{position:sticky;top:58px;background:rgba(8,8,16,0.95);z-index:900;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.06)}
.tabs-scroll{display:flex;overflow-x:auto;scrollbar-width:none;padding:0 4px}
.tabs-scroll::-webkit-scrollbar{display:none}
.tab-btn{padding:13px 20px;font-size:13px;font-weight:700;color:#64748b;background:transparent;border:none;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;border-bottom:2px solid transparent;transition:all 0.2s;flex-shrink:0;position:relative}
.tab-btn.active{color:#fff;border-bottom-color:#00d4ff}
.tab-btn.active::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:6px;height:6px;background:#00d4ff;border-radius:50%;box-shadow:0 0 8px #00d4ff}

/* ── Panels ── */
.panel{display:none;padding:14px 14px 100px}
.panel.active{display:block}

/* ── Subject Cards ── */
.subjects-list{display:flex;flex-direction:column;gap:8px}
.subject-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:16px;display:flex;align-items:center;text-decoration:none;color:#fff;overflow:hidden;transition:all 0.2s;min-height:76px;position:relative}
.subject-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,#00d4ff,#818cf8);opacity:0;transition:opacity 0.2s}
.subject-card:active{transform:scale(0.985);background:rgba(0,212,255,0.05)}
.subject-card:active::before{opacity:1}
.subject-card:hover{border-color:rgba(0,212,255,0.2);background:rgba(0,212,255,0.04)}
.subject-card:hover::before{opacity:1}

.sub-thumb{width:76px;height:76px;background:#131320 url('https://study-mf.pw.live/static/image/teacherbg.807b2b2f.png') center/cover;flex-shrink:0;overflow:hidden;position:relative}
.sub-thumb img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
.sub-thumb-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,212,255,0.1),transparent)}

.sub-body{flex:1;padding:12px 14px;min-width:0}
.sub-name{font-size:14px;font-weight:700;line-height:1.45;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:#f1f5f9}
.sub-meta{display:flex;align-items:center;gap:6px}
.sub-count-badge{font-size:10px;font-weight:700;color:#00d4ff;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.2);border-radius:20px;padding:2px 8px}

.sub-arrow{width:40px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sub-arrow svg{width:16px;height:16px;stroke:rgba(0,212,255,0.5);stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round;transition:transform 0.2s}
.subject-card:active .sub-arrow svg{transform:translateX(3px)}

/* ── Announcements ── */
.ann-list{display:flex;flex-direction:column;gap:10px}
.ann-card{background:rgba(255,255,255,0.03);border-radius:16px;border:1px solid rgba(255,255,255,0.07);overflow:hidden;transition:border-color 0.2s}
.ann-card:hover{border-color:rgba(0,212,255,0.2)}
.ann-head{padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,0.05)}
.ann-type-badge{display:inline-block;font-size:10px;font-weight:800;letter-spacing:0.6px;text-transform:uppercase;color:#818cf8;background:rgba(129,140,248,0.1);border:1px solid rgba(129,140,248,0.2);border-radius:20px;padding:2px 8px;margin-bottom:8px}
.ann-title{font-size:15px;font-weight:800;margin-bottom:4px;color:#fff;line-height:1.3}
.ann-date{font-size:11px;color:#475569;font-weight:600}
.ann-body{padding:12px 16px;font-size:13px;line-height:1.7;color:#94a3b8}
.ann-img{width:100%;display:block;object-fit:cover;max-height:260px}

/* ── Skeleton ── */
.skel{background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.04) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:16px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── Tests ── */
.filter-row{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-btn{padding:7px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;color:#64748b;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;transition:all 0.2s}
.filter-btn.active{background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.4);color:#00d4ff}
.test-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:16px;margin-bottom:8px}
.test-name{font-size:14px;font-weight:700;margin-bottom:10px;line-height:1.4;color:#f1f5f9}
.test-meta{display:flex;gap:8px;font-size:11px;color:#64748b;margin-bottom:14px;flex-wrap:wrap}
.test-meta span{background:rgba(255,255,255,0.05);padding:3px 8px;border-radius:8px}
.test-btn{background:linear-gradient(135deg,#00d4ff,#0ea5e9);color:#0a0a0a;border:none;border-radius:10px;padding:11px;font-weight:800;width:100%;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;letter-spacing:0.3px;display:block;text-align:center;text-decoration:none}

/* ── Empty ── */
.empty{text-align:center;padding:56px 20px;color:#334155}
.empty .ico{font-size:40px;margin-bottom:12px;opacity:0.4;display:block}
.empty p{font-size:14px;font-weight:600}
</style>
</head>
<body>

<div class="header">
    <a href="/index.html" class="back-btn">
        <div class="back-icon"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></div>
        <span class="header-title" id="headerTitle">Subjects</span>
    </a>
    <div class="header-line"></div>
</div>

<div class="page">
    <!-- Live Schedule -->
    <div class="live-section" id="liveSection">
        <div class="sec-label"><span class="live-dot"></span>Today's Live Classes</div>
        <div class="sched-scroll" id="schedList"></div>
        <div class="section-divider"></div>
    </div>

    <!-- Tabs -->
    <div class="tabs-wrap">
        <div class="tabs-scroll">
            <button class="tab-btn active" onclick="switchTab('classes',this)">All Classes</button>
            <button class="tab-btn" onclick="switchTab('tests',this)">Tests</button>
            <button class="tab-btn" onclick="switchTab('announcements',this)">Announcements</button>
        </div>
    </div>

    <!-- All Classes -->
    <div id="panel-classes" class="panel active">
        <div class="subjects-list" id="subjectsList">
            <div class="skel" style="height:72px"></div>
            <div class="skel" style="height:72px"></div>
            <div class="skel" style="height:72px"></div>
            <div class="skel" style="height:72px"></div>
        </div>
    </div>

    <!-- Tests -->
    <div id="panel-tests" class="panel">
        <div class="filter-row" id="testFilters"></div>
        <div id="testsList"></div>
    </div>

    <!-- Announcements -->
    <div id="panel-announcements" class="panel">
        <div class="ann-list" id="annList"></div>
        <div id="annSkel" style="display:none"><div class="skel" style="height:100px;margin-bottom:10px"></div></div>
    </div>
</div>
<script src="config.js"></script>
<script>
const QS = new URLSearchParams(location.search);
const BATCH_ID   = QS.get('batchId')   || '';
const BATCH_NAME = QS.get('batchName') || '';
if(!BATCH_ID) location.href = '/index.html';

document.title = (BATCH_NAME || 'Subjects') + ' — AS Multiverse';
document.getElementById('headerTitle').textContent = BATCH_NAME || 'Subjects';

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function ep(s){return encodeURIComponent(s||'')}
function img(obj){ return obj?.baseUrl && obj?.key ? obj.baseUrl + obj.key : ''; }

function fmtTime(iso) {
    if(!iso) return '';
    const d = new Date(iso);
    if(isNaN(d)) return '';
    return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

const state = { ann:{page:1,loading:false,done:false,loaded:false}, tests:{loaded:false} };

/* ─── SUBJECTS ─── */
async function loadSubjects() {
    const data = await pw(`https://api.penpencil.co/v3/batches/${BATCH_ID}/details`);
    const list = document.getElementById('subjectsList');

    if(!data?.data?.subjects?.length) {
        list.innerHTML = '<div class="empty"><div class="ico">📭</div>No subjects found</div>';
        return;
    }

    list.innerHTML = '';
    data.data.subjects.forEach(sub => {
        const thumbUrl = img(sub.imageId);
        const count    = sub.lectureCount || 0;

        const a = document.createElement('a');
        a.className = 'subject-card';
        a.href = `/content.html?batchId=${ep(BATCH_ID)}&subjectId=${ep(sub._id)}&batchName=${ep(BATCH_NAME)}&subjectName=${ep(sub.subject)}`;
        a.innerHTML = `
            <div class="sub-thumb">
                ${thumbUrl ? `<img src="${esc(thumbUrl)}" alt="" loading="lazy" onerror="this.parentElement.style.background='#131320'">` : ''}
                <div class="sub-thumb-overlay"></div>
            </div>
            <div class="sub-body">
                <div class="sub-name">${esc(sub.subject)}</div>
                <div class="sub-meta">${count ? `<span class="sub-count-badge">${count} Lectures</span>` : ''}</div>
            </div>
            <div class="sub-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
        `;
        list.appendChild(a);
    });
}

/* ─── LIVE SCHEDULE ─── */
async function loadSchedule() {
    const data = await pw(`https://api.penpencil.co/v2/batches/${BATCH_ID}/todays-schedule`);
    if(!data?.data?.length) return;

    // Collect teacher IDs from all schedule items (stored in item.data.teachers[])
    const allTeacherIds = [];
    data.data.forEach(item => {
        const d = item.data || item;
        if(d.teachers?.length) d.teachers.forEach(id => allTeacherIds.push(id));
    });
    const uniqueIds = [...new Set(allTeacherIds)];

    let tMap = {};
    if(uniqueIds.length) {
        const tData = await pw(`https://api.penpencil.co/v1/users/get-user-details-list?userIds=${uniqueIds.join(',')}`);
        if(tData?.data) tData.data.forEach(t => tMap[t._id] = t);
    }

    const section = document.getElementById('liveSection');
    const list    = document.getElementById('schedList');
    section.style.display = 'block';

    data.data.forEach(wrapper => {
        const item = wrapper.data || wrapper; // API wraps in .data

        const startISO = item.startTime || item.date;
        const endISO   = item.endTime;
        const now      = Date.now();
        const start    = startISO ? new Date(startISO).getTime() : NaN;
        const end      = endISO   ? new Date(endISO).getTime()   : NaN;

        // Tag from API or compute
        let tag = (wrapper.tag || item.tag || 'Upcoming').toLowerCase();
        let badgeCls = 'badge-upcoming', cardCls = 'upcoming', badgeText = 'UPCOMING';
        if(!isNaN(start) && !isNaN(end)) {
            if(now >= start && now <= end) { tag = 'live'; }
            else if(now > end)            { tag = 'ended'; }
        }
        if(tag === 'live')  { badgeCls = 'badge-live';   cardCls = 'live';   badgeText = '🔴 LIVE'; }
        if(tag === 'ended') { badgeCls = 'badge-ended';  cardCls = 'ended';  badgeText = 'ENDED'; }

        // Teacher
        const firstTeacherId = item.teachers?.[0];
        const teacher = firstTeacherId ? (tMap[firstTeacherId] || {}) : {};
        const teacherName = teacher.firstName ? `${teacher.firstName} ${teacher.lastName||''}`.trim() : (item.facultyName || 'Faculty');
        const teacherImg  = img(teacher.imageId);

        // Subject name from nested object
        const subjectName = item.subjectId?.name || item.subject || '';
        const topic       = item.topic || 'Class';
        const timeStr     = fmtTime(startISO);

        const schedId = item._id || wrapper._id;
        const subId   = item.subjectId?._id || item.subjectId || '';

        const a = document.createElement('a');
        a.className = `sched-card ${cardCls}`;
        a.href      = `https://stream.testuk.org/schedule-details?batchId=${ep(BATCH_ID)}&subjectId=${ep(subId)}&scheduleId=${ep(schedId)}&tap=video`;
        a.target    = '_blank';

        a.innerHTML = `
            <div class="sched-thumb">
                ${teacherImg ? `<img src="${esc(teacherImg)}" alt="${esc(teacherName)}" onerror="this.remove()">` : ''}
                <div class="sched-thumb-overlay"></div>
                <span class="sched-badge ${badgeCls}">${badgeText}</span>
                ${timeStr ? `<span class="sched-time-pill">${timeStr}</span>` : ''}
            </div>
            <div class="sched-info">
                <div class="sched-subject">${esc(subjectName)}</div>
                <div class="sched-topic">${esc(topic)}</div>
                <div class="sched-teacher">By ${esc(teacherName)}</div>
            </div>
        `;
        list.appendChild(a);
    });
}

/* ─── ANNOUNCEMENTS ─── */
async function loadAnnouncements() {
    if(state.ann.loading || state.ann.done) return;
    state.ann.loading = true;
    const skel = document.getElementById('annSkel');
    skel.style.display = 'block';

    const data = await pw(`https://api.penpencil.co/v1/batches/${BATCH_ID}/announcement?page=${state.ann.page}`);
    skel.style.display = 'none';
    state.ann.loaded   = true;

    const list = document.getElementById('annList');
    if(!data?.data?.length) {
        state.ann.done = true;
        if(state.ann.page === 1) list.innerHTML = '<div class="empty"><div class="ico">📢</div>No announcements yet</div>';
        return;
    }

    data.data.forEach(item => {
        const d = item.createdAt ? new Date(item.createdAt) : null;
        const dateStr = d && !isNaN(d) ? d.toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
        const title   = item.heading || '';
        const body    = item.announcement || item.description || '';
        const imgUrl  = item.attachment ? img(item.attachment) : (item.image || '');

        const div = document.createElement('div');
        div.className = 'ann-card';
        div.innerHTML = `
            <div class="ann-card">
                <div class="ann-head">
                    ${item.type ? `<div class="ann-type-badge">${esc(item.type)}</div>` : ''}
                    ${title ? `<div class="ann-title">${esc(title)}</div>` : ''}
                    ${dateStr ? `<div class="ann-date">${dateStr}</div>` : ''}
                </div>
                ${body ? `<div class="ann-body">${body.replace(/\n/g,'<br>')}</div>` : ''}
                ${imgUrl ? `<img src="${esc(imgUrl)}" class="ann-img" loading="lazy">` : ''}
            </div>
        `;
        list.appendChild(div);
    });

    if(data.data.length < 10) state.ann.done = true;
    else { state.ann.page++; state.ann.loading = false; }
}

/* ─── TESTS ─── */
async function loadTests() {
    if(state.tests.loaded) return;
    const fc = document.getElementById('testFilters');
    const tl = document.getElementById('testsList');
    tl.innerHTML = '<div class="skel" style="height:100px;margin-bottom:8px"></div>'.repeat(3);

    const res = await pw(`https://api.penpencil.co/v3/test-service/tests/filters?batchId=${BATCH_ID}`);
    state.tests.loaded = true;

    // API uses 'categorySections' (plural) with nested 'sections[]
    const cats = res?.data?.categorySections || res?.data?.categorySection || [];
    if(!cats.length) {
        fc.style.display = 'none';
        tl.innerHTML = '<div class="empty"><div class="ico">📋</div><p>No tests available</p></div>';
        return;
    }

    cats.forEach((cat, i) => {
        // each cat has sections[] with {id, title}
        const sections = cat.sections || [];
        sections.forEach((sec, j) => {
            const btn = document.createElement('button');
            btn.className = `filter-btn${(i===0 && j===0) ? ' active' : ''}`;
            btn.textContent = sec.title || cat.categoryName || 'Tests';
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                fetchTests(sec.id, cat.categoryId);
            };
            fc.appendChild(btn);
            if(i===0 && j===0) fetchTests(sec.id, cat.categoryId);
        });
    });
}

async function fetchTests(sectionId, categoryId) {
    const tl = document.getElementById('testsList');
    tl.innerHTML = '<div class="skel" style="height:100px;margin-bottom:8px"></div>'.repeat(3);

    // Try by section first, fallback to batch-level tests
    let data = await pw(`https://api.penpencil.co/v3/test-service/tests?batchId=${BATCH_ID}&sectionId=${ep(sectionId)}`);
    if(!data?.data?.length) {
        data = await pw(`https://api.penpencil.co/v3/test-service/tests?batchId=${BATCH_ID}`);
    }

    if(!data?.data?.length) {
        tl.innerHTML = '<div class="empty"><div class="ico">📋</div><p>No tests here</p></div>';
        return;
    }
    tl.innerHTML = '';
    data.data.forEach(t => {
        const testUrl = `https://stream.testuk.org/test?testId=${ep(t._id)}&batchId=${ep(BATCH_ID)}`;
        const d = document.createElement('div');
        d.className = 'test-card';
        d.innerHTML = `
            <div class="test-name">${esc(t.name)}</div>
            <div class="test-meta">
                <span>📋 ${t.totalQuestions||0} Qs</span>
                <span>⏱️ ${t.maxDuration||0} min</span>
                <span>⭐ ${t.totalMarks||0} marks</span>
            </div>
            <a href="${testUrl}" target="_blank" class="test-btn">View Test →</a>
        `;
        tl.appendChild(d);
    });
}
}

/* ─── TABS ─── */
function switchTab(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    if(tab === 'announcements' && !state.ann.loaded)  loadAnnouncements();
    if(tab === 'tests'         && !state.tests.loaded) loadTests();
}

window.addEventListener('scroll', () => {
    const panel = document.getElementById('panel-announcements');
    if(panel.classList.contains('active') && window.scrollY + window.innerHeight >= document.documentElement.scrollHeight - 150) {
        loadAnnouncements();
    }
});

/* ─── INIT ─── */
(async () => {
    loadSchedule();
    await loadSubjects();
})();
</script>
