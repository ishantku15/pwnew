<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Login — AS Multiverse</title>
<link rel="icon" type="image/png" href="https://d2bps9p1kiy4ka.cloudfront.net/5b09189f7285894d9130ccd0/e00a5c58-461c-4c43-a911-d606e00ad53b.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;outline:none;-webkit-tap-highlight-color:transparent}
body,html{min-height:100vh;font-family:'Inter',sans-serif;background:#0a0a0a;color:#fff}
body{display:flex;align-items:center;justify-content:center;padding:20px}

.login-container{
  width:100%;max-width:400px;
  background:#141414;
  border:1px solid #1e1e1e;
  border-radius:20px;
  padding:40px 28px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

.brand{text-align:center;margin-bottom:32px}
.brand-icon{
  width:56px;height:56px;
  background:linear-gradient(135deg,#00d4ff,#0088aa);
  border-radius:14px;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:900;color:#fff;
  box-shadow:0 4px 20px rgba(0,212,255,0.3);
  margin-bottom:12px;
}
.brand-title{font-size:22px;font-weight:800;letter-spacing:2px;
  background:linear-gradient(135deg,#00d4ff,#0088aa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.brand-sub{font-size:13px;color:#9ca3af;margin-top:6px}

.step{display:none}
.step.active{display:block}

.input-group{margin-bottom:20px}
.input-label{display:block;font-size:12px;font-weight:700;color:#9ca3af;letter-spacing:0.5px;margin-bottom:8px;text-transform:uppercase}
.input-field{
  width:100%;padding:14px 16px;
  background:#0a0a0a;color:#fff;
  border:1px solid #1e1e1e;border-left:3px solid #00d4ff;
  border-radius:12px;font-size:16px;font-weight:600;
  letter-spacing:1px;
  transition:border-color 0.25s,box-shadow 0.25s;
}
.input-field::placeholder{color:#555;font-weight:400;letter-spacing:0}
.input-field:focus{border-color:rgba(0,212,255,0.5);box-shadow:0 0 0 3px rgba(0,212,255,0.08)}

.textarea-field{
  width:100%;padding:14px 16px;
  background:#0a0a0a;color:#fff;
  border:1px solid #1e1e1e;border-left:3px solid #00d4ff;
  border-radius:12px;font-size:12px;font-weight:500;
  font-family:'Inter',monospace;
  resize:vertical;min-height:80px;
  transition:border-color 0.25s,box-shadow 0.25s;
}
.textarea-field::placeholder{color:#555;font-weight:400}
.textarea-field:focus{border-color:rgba(0,212,255,0.5);box-shadow:0 0 0 3px rgba(0,212,255,0.08)}

.phone-row{display:flex;gap:10px;align-items:center}
.country-code{
  padding:14px 12px;background:#0a0a0a;color:#9ca3af;
  border:1px solid #1e1e1e;border-radius:12px;
  font-size:16px;font-weight:700;min-width:60px;text-align:center;
}
.phone-row .input-field{flex:1}

.btn-primary{
  width:100%;padding:14px;
  background:#00d4ff;color:#0a0a0a;
  border:none;border-radius:12px;
  font-size:15px;font-weight:800;letter-spacing:0.5px;
  cursor:pointer;transition:all 0.2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-primary:hover{background:#0088aa;color:#fff;box-shadow:0 4px 20px rgba(0,212,255,0.3)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-primary .spinner{
  width:18px;height:18px;border:3px solid rgba(0,0,0,0.2);
  border-top-color:#0a0a0a;border-radius:50%;
  animation:spin 0.8s linear infinite;display:none;
}
.btn-primary.loading .spinner{display:block}
.btn-primary.loading .btn-text{display:none}
@keyframes spin{to{transform:rotate(360deg)}}

.btn-secondary{
  width:100%;padding:12px;margin-top:12px;
  background:transparent;color:#9ca3af;
  border:1px solid #1e1e1e;border-radius:12px;
  font-size:13px;font-weight:600;cursor:pointer;
  transition:all 0.2s;
}
.btn-secondary:hover{border-color:#00d4ff;color:#00d4ff}

.otp-type-row{display:flex;gap:8px;margin-bottom:20px}
.otp-type-btn{
  flex:1;padding:10px;text-align:center;
  background:#0a0a0a;color:#9ca3af;
  border:1px solid #1e1e1e;border-radius:10px;
  font-size:12px;font-weight:700;cursor:pointer;
  transition:all 0.2s;
}
.otp-type-btn.active{background:rgba(0,212,255,0.1);color:#00d4ff;border-color:#00d4ff}

.error-msg{
  background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);
  color:#ef4444;padding:10px 14px;border-radius:10px;
  font-size:13px;font-weight:600;margin-bottom:16px;
  display:none;
}
.error-msg.show{display:block}

.success-msg{
  background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);
  color:#22c55e;padding:10px 14px;border-radius:10px;
  font-size:13px;font-weight:600;margin-bottom:16px;
  display:none;
}
.success-msg.show{display:block}

.logged-in{text-align:center;padding:20px 0}
.logged-in .avatar{
  width:64px;height:64px;background:linear-gradient(135deg,#00d4ff,#0088aa);
  border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:900;color:#fff;margin-bottom:16px;
}
.logged-in .name{font-size:18px;font-weight:800;margin-bottom:4px}
.logged-in .phone{font-size:13px;color:#9ca3af;margin-bottom:24px}

.divider{
  display:flex;align-items:center;gap:12px;margin:20px 0;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#1e1e1e}
.divider span{font-size:11px;color:#555;font-weight:700;letter-spacing:1px}

.skip-link{
  display:block;text-align:center;margin-top:20px;
  color:#555;font-size:12px;font-weight:600;
  text-decoration:none;transition:color 0.2s;
}
.skip-link:hover{color:#00d4ff}

.token-hint{font-size:11px;color:#555;margin-top:8px;line-height:1.4}
</style>
</head>
<body>

<div class="login-container">
  <div class="brand">
    <div class="brand-icon">AS</div>
    <div class="brand-title">AS MULTIVERSE</div>
    <div class="brand-sub">Login with your PhysicsWallah account</div>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>

  <!-- Step 1: Phone Number -->
  <div class="step active" id="stepPhone">
    <div class="input-group">
      <label class="input-label">Phone Number</label>
      <div class="phone-row">
        <div class="country-code">+91</div>
        <input type="tel" class="input-field" id="phoneInput" placeholder="Enter mobile number" maxlength="10" autocomplete="tel">
      </div>
    </div>
    <button class="btn-primary" id="sendOtpBtn" onclick="sendOtp()">
      <span class="btn-text">Send OTP</span>
      <div class="spinner"></div>
    </button>

    <div class="divider"><span>OR</span></div>

    <!-- Manual Token Input (works on Live Server) -->
    <div class="input-group">
      <label class="input-label">Paste Token Directly</label>
      <textarea class="textarea-field" id="tokenInput" placeholder="Paste your PW Bearer token here..." rows="3"></textarea>
      <div class="token-hint">Get your token from PW app or browser dev tools. Works without backend.</div>
    </div>
    <button class="btn-primary" onclick="saveManualToken()" style="background:#22c55e">
      <span class="btn-text">Save Token & Continue</span>
    </button>

    <a href="/index.html" class="skip-link">Skip login and browse batches</a>
  </div>

  <!-- Step 2: OTP Verification -->
  <div class="step" id="stepOtp">
    <div class="otp-type-row">
      <button class="otp-type-btn active" data-type="sms" onclick="setOtpType('sms', this)">SMS OTP</button>
      <button class="otp-type-btn" data-type="whatsapp" onclick="setOtpType('whatsapp', this)">WhatsApp OTP</button>
    </div>
    <div class="input-group">
      <label class="input-label">Enter OTP</label>
      <input type="tel" class="input-field" id="otpInput" placeholder="Enter 6-digit OTP" maxlength="6" autocomplete="one-time-code">
    </div>
    <button class="btn-primary" id="verifyOtpBtn" onclick="verifyOtp()">
      <span class="btn-text">Verify & Login</span>
      <div class="spinner"></div>
    </button>
    <button class="btn-secondary" onclick="goBackToPhone()">Change Phone Number</button>
  </div>

  <!-- Step 3: Success -->
  <div class="step" id="stepSuccess">
    <div class="logged-in">
      <div class="avatar" id="avatarInitial">A</div>
      <div class="name" id="userName">User</div>
      <div class="phone" id="userPhone">+91 XXXXXXXXXX</div>
      <button class="btn-primary" onclick="window.location.href='/index.html'">
        <span class="btn-text">Browse Batches</span>
      </button>
      <button class="btn-secondary" onclick="logout()">Logout</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
let phone = '';
let otpType = 'sms';

// Check if already logged in
(function checkExisting() {
  const token = localStorage.getItem('pw_token');
  const user = JSON.parse(localStorage.getItem('pw_user') || 'null');
  if (token && user) {
    showLoggedIn(user);
  }
})();

function showStep(id) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  hideError();
  hideSuccess();
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}
function hideError() { document.getElementById('errorMsg').classList.remove('show'); }

function showSuccess(msg) {
  const el = document.getElementById('successMsg');
  el.textContent = msg;
  el.classList.add('show');
}
function hideSuccess() { document.getElementById('successMsg').classList.remove('show'); }

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (loading) { btn.classList.add('loading'); btn.disabled = true; }
  else { btn.classList.remove('loading'); btn.disabled = false; }
}

function setOtpType(type, btn) {
  otpType = type;
  document.querySelectorAll('.otp-type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// Manual token save (works on Live Server without backend)
function saveManualToken() {
  let token = document.getElementById('tokenInput').value.trim();
  if (!token) {
    showError('Please paste a valid token');
    return;
  }
  // Strip "Bearer " prefix if user included it
  if (token.toLowerCase().startsWith('bearer ')) {
    token = token.substring(7).trim();
  }
  localStorage.setItem('pw_token', token);
  localStorage.setItem('pw_user', JSON.stringify({ name: 'PW User', username: 'manual' }));
  showLoggedIn({ name: 'PW User', username: 'manual' });
  showSuccess('Token saved successfully!');
}

async function sendOtp() {
  phone = document.getElementById('phoneInput').value.trim();
  if (!/^\d{10}$/.test(phone)) {
    showError('Please enter a valid 10-digit phone number');
    return;
  }

  hideError();
  setLoading('sendOtpBtn', true);

  try {
    const data = await pwAuth('sendOtp', phone);

    if (data && data.success !== false && !data.error) {
      showStep('stepOtp');
      showSuccess('OTP sent to +91 ' + phone);
    } else {
      showError(data?.message || data?.error || 'Failed to send OTP. Try again.');
    }
  } catch (e) {
    showError('Network error. Please check your connection.');
  }

  setLoading('sendOtpBtn', false);
}

async function verifyOtp() {
  const otp = document.getElementById('otpInput').value.trim();
  if (!/^\d{4,6}$/.test(otp)) {
    showError('Please enter a valid OTP');
    return;
  }

  hideError();
  setLoading('verifyOtpBtn', true);

  try {
    const data = await pwAuth('verifyOtp', phone, otp, otpType);

    if (data && data.success && data.token) {
      localStorage.setItem('pw_token', data.token);
      localStorage.setItem('pw_user', JSON.stringify(data.user));
      showLoggedIn(data.user);
    } else {
      showError(data?.message || data?.error || 'Invalid OTP. Please try again.');
    }
  } catch (e) {
    showError('Network error. Please check your connection.');
  }

  setLoading('verifyOtpBtn', false);
}

function showLoggedIn(user) {
  showStep('stepSuccess');
  const name = user.name || 'User';
  const username = user.username || phone || '';
  document.getElementById('avatarInitial').textContent = name.charAt(0).toUpperCase();
  document.getElementById('userName').textContent = name;
  document.getElementById('userPhone').textContent = username && username !== 'manual' ? '+91 ' + username : 'Token login';
}

function goBackToPhone() {
  showStep('stepPhone');
  document.getElementById('otpInput').value = '';
}

function logout() {
  localStorage.removeItem('pw_token');
  localStorage.removeItem('pw_user');
  showStep('stepPhone');
  document.getElementById('phoneInput').value = '';
  document.getElementById('otpInput').value = '';
  document.getElementById('tokenInput').value = '';
}

// Enter key support
document.getElementById('phoneInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendOtp();
});
document.getElementById('otpInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') verifyOtp();
});
</script>
</body>
</html>
