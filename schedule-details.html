<!DOCTYPE html>
<html lang="en">
<head><script>window.location.replace('/maintenance.html');</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Player — AS Multiverse</title>
<link rel="icon" type="image/png" href="https://d2bps9p1kiy4ka.cloudfront.net/5b09189f7285894d9130ccd0/e00a5c58-461c-4c43-a911-d606e00ad53b.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;outline:none;-webkit-tap-highlight-color:transparent;user-select:none}
body,html{min-height:100%;font-family:'Inter',sans-serif;background:#0a0a0a;color:#fff;overflow-x:hidden}

/* Header */
.header{position:fixed;top:0;left:0;right:0;height:52px;background:#0a0a0a;display:flex;align-items:center;padding:0 12px;z-index:1000;border-bottom:1px solid #1e1e1e}
.header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,0.5),transparent)}
.back-btn{display:flex;align-items:center;gap:8px;color:#fff;text-decoration:none;font-weight:700;font-size:16px;cursor:pointer;padding:8px 0;flex:1}
.back-btn svg{width:20px;height:20px;stroke:#00d4ff;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.header-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Main Area */
.main-content{margin-top:52px;width:100%;max-width:1000px;margin-left:auto;margin-right:auto}

/* Player Wrapper */
.player-wrapper{width:100%;background:#000;aspect-ratio:16/9;position:relative;display:flex;align-items:center;justify-content:center}
#videoPlayer{width:100%;height:100%;display:none;outline:none}
.iframe-player{width:100%;height:100%;border:none;display:none}

/* Loading/Error States */
.state-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;z-index:10}
.spinner{width:40px;height:40px;border:4px solid rgba(0,212,255,0.2);border-top-color:#00d4ff;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{color:#ef4444;font-size:14px;text-align:center;padding:20px}
.retry-btn{margin-top:16px;background:transparent;border:1px solid #00d4ff;color:#00d4ff;padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer}

/* Video Info */
.video-info{padding:20px 16px}
.v-title{font-size:18px;font-weight:800;color:#fff;margin-bottom:8px;line-height:1.4}
.v-meta{display:flex;gap:12px;font-size:13px;color:#9ca3af;font-weight:500;margin-bottom:16px;flex-wrap:wrap}

/* Note Viewer */
.note-container{padding:20px 16px;text-align:center}
.note-icon{font-size:48px;margin-bottom:16px}
.note-title{font-size:18px;font-weight:700;margin-bottom:8px}
.note-date{font-size:13px;color:#9ca3af;margin-bottom:24px}
.btn-primary{display:inline-block;background:#00d4ff;color:#0a0a0a;padding:12px 24px;border-radius:12px;font-weight:800;text-decoration:none;font-size:15px}

.skel{background:linear-gradient(90deg,#141414 25%,#1e1e1e 50%,#141414 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
.skel-title{height:24px;width:80%;margin-bottom:12px}
.skel-meta{height:16px;width:40%}
</style>
</head>
<body>

<div class="header">
    <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        <span class="header-title" id="headerTitle">Loading...</span>
    </div>
</div>

<div class="main-content" id="mainContent">
    <!-- View will be injected here -->
</div>

<script>
const QS = new URLSearchParams(location.search);
const BATCH_ID = QS.get('batchId') || '';
const SUBJECT_ID = QS.get('subjectId') || '';
const SCHEDULE_ID = QS.get('scheduleId') || '';
const TAP = QS.get('tap') || 'video';
const NOTE_IDX = parseInt(QS.get('noteIndex') || '0', 10);

if(!BATCH_ID || !SUBJECT_ID || !SCHEDULE_ID) window.location.href = '/index.html';

document.getElementById('headerTitle').textContent = TAP === 'video' ? 'Now Playing' : 'Notes';

function getToken() { return localStorage.getItem('pw_token') || ''; }
async function pw(url) {
    const headers = {};
    const token = getToken();
    if(token) headers['X-PW-Token'] = token;
    try {
        const res = await fetch('https://pw.modgalaxy.in/api/pw?url=' + encodeURIComponent(url), { headers });
        if(res.ok || res.status === 401) {
            const data = await res.json();
            if(data.needsLogin) { throw new Error('Fallback'); }
            return data;
        }
        throw new Error('Fallback');
    } catch(e) {
        // Fallback for Live Server (no backend)
        const FALLBACK_TOKEN = "Bearer eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJleHAiOjE3ODIzOTAxMTMuNzEyLCJkYXRhIjp7Il9pZCI6IjY2OWUzMzhjOGY5ZDhlYzIzZThlNzJkMCIsInVzZXJuYW1lIjoiNzgzMDMzNzI3MSIsImZpcnN0TmFtZSI6IkFiaGlzaGVrIiwibGFzdE5hbWUiOiJZYWRhdiIsIm9yZ2FuaXphdGlvbiI6eyJfaWQiOiI1ZWIzOTNlZTk1ZmFiNzQ2OGE3OWQxODkiLCJ3ZWJzaXRlIjoicGh5c2ljc3dhbGxhaC5jb20iLCJuYW1lIjoiUGh5c2ljc3dhbGxhaCJ9LCJyb2xlcyI6WyI1YjI3YmQ5NjU4NDJmOTUwYTc3OGM2ZWYiXSwiY291bnRyeUdyb3VwIjoiSU4iLCJ0eXBlIjoiVVNFUiJ9LCJqdGkiOiJra291RTR3ZVJjV3BIbUdPNWtRQWZ3XzY2OWUzMzhjOGY5ZDhlYzIzZThlNzJkMCIsImlhdCI6MTc4MTc4NTMxM30.2w2lMP9BrAhJq5Tt7vrXOyOBM_lGW0tCJnniu_Yogsc";
        const DIRECT_HEADERS = {
            "User-Agent": "Dalvik/2.1.0",
            "client-id": "ADMIN",
            "client-type": "MOBILE",
            "client-version": "538",
            "device-meta": '{"APP_VERSION":"538","APP_VERSION_NAME":"15.32.0","DEVICE_MAKE":"Samsung","DEVICE_MODEL":"SM-A707F","OS_VERSION":"11","PACKAGE_NAME":"xyz.penpencil.physicswala","network":"wifi_data","carrier":"UNDEFINED"}',
            "authorization": token ? "Bearer " + token : FALLBACK_TOKEN
        };
        try {
            const dirRes = await fetch(url, { headers: DIRECT_HEADERS });
            return await dirRes.json();
        } catch(err) {
            console.error('Direct fetch failed:', err);
            return null;
        }
    }
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtDate(iso){if(!iso)return'';try{const d=new Date(iso);return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}catch{return'';}}

const main = document.getElementById('mainContent');

function renderVideoPlayer(title, date, dur, url, isEmbed) {
    document.title = (title || 'Video') + ' — AS Multiverse';
    main.innerHTML = `
        <div class="player-wrapper" id="pWrap">
            <div class="state-overlay" id="pLoad"><div class="spinner"></div></div>
            ${isEmbed ? `<iframe src="${esc(url)}" class="iframe-player" id="vFrame" allowfullscreen></iframe>` : `<video id="videoPlayer" controls playsinline></video>`}
        </div>
        <div class="video-info">
            <div class="v-title">${esc(title)}</div>
            <div class="v-meta"><span>📅 ${esc(date)}</span>${dur ? `<span>⏱️ ${esc(dur)}</span>` : ''}</div>
        </div>
    `;

    const pLoad = document.getElementById('pLoad');
    
    if(isEmbed) {
        const frame = document.getElementById('vFrame');
        frame.onload = () => { pLoad.style.display = 'none'; frame.style.display = 'block'; };
    } else {
        const video = document.getElementById('videoPlayer');
        video.oncanplay = () => { pLoad.style.display = 'none'; video.style.display = 'block'; video.play().catch(e=>console.log("Autoplay blocked:", e)); };
        video.onerror = () => { pLoad.innerHTML = '<div class="error-msg">Video failed to load</div>'; };

        if (Hls.isSupported() && url.includes('.m3u8')) {
            const hls = new Hls({ maxMaxBufferLength: 60 });
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                pLoad.style.display = 'none';
                video.style.display = 'block';
                video.play().catch(e=>console.log("Autoplay blocked:", e));
            });
            hls.on(Hls.Events.ERROR, (e, data) => {
                if(data.fatal) pLoad.innerHTML = '<div class="error-msg">Stream playback error</div>';
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.addEventListener('loadedmetadata', () => { pLoad.style.display = 'none'; video.style.display = 'block'; video.play(); });
        } else {
            video.src = url;
        }
    }
}

function renderNote(title, date, url) {
    document.title = (title || 'Notes') + ' — AS Multiverse';
    main.innerHTML = `
        <div class="note-container">
            <div class="note-icon">📄</div>
            <div class="note-title">${esc(title)}</div>
            <div class="note-date">📅 ${esc(date)}</div>
            <a href="${esc(url)}" target="_blank" class="btn-primary">View PDF Document</a>
        </div>
    `;
}

function renderError(msg) {
    main.innerHTML = `<div class="note-container"><div class="error-msg">${esc(msg)}</div><button class="retry-btn" onclick="location.reload()">Retry</button></div>`;
}

async function loadData() {
    main.innerHTML = `
        <div class="player-wrapper"><div class="state-overlay"><div class="spinner"></div></div></div>
        <div class="video-info"><div class="skel skel-title"></div><div class="skel skel-meta"></div></div>
    `;

    let data = await pw(`https://api.penpencil.co/v2/batches/${BATCH_ID}/subject/${SUBJECT_ID}/contents/${SCHEDULE_ID}`);
    if(!data || !data.success) {
        data = await pw(`https://api.penpencil.co/v1/batches/${BATCH_ID}/subject/${SUBJECT_ID}/schedule/${SCHEDULE_ID}`);
    }

    if(!data || !data.success || !data.data) {
        renderError('Failed to load content details');
        return;
    }

    const item = data.data;

    if(TAP === 'video') {
        const vd = item.videoDetails || {};
        const title = item.topic || vd.name || 'Video Session';
        const date = fmtDate(item.date || item.startTime);
        const dur = vd.duration || '';
        
        let url = vd.videoUrl;
        let isEmbed = false;
        if(!url && vd.key) url = `https://d1d34p8vz63oiq.cloudfront.net/${vd.key}/master.m3u8`;
        if(!url && vd.embedUrl) { url = vd.embedUrl; isEmbed = true; }

        if(!url) {
            renderError('No video stream available for this session');
            return;
        }

        renderVideoPlayer(title, date, dur, url, isEmbed);
    } 
    else if(TAP === 'note') {
        const hws = item.homeworkIds || [];
        let attachments = [];
        hws.forEach(hw => { if(hw.attachmentIds) attachments.push(...hw.attachmentIds); });
        
        const att = attachments[NOTE_IDX] || attachments[0];
        if(!att) {
            renderError('No notes available for this session');
            return;
        }

        const title = item.topic || att.name || 'Lecture Notes';
        const date = fmtDate(item.date || item.startTime);
        const url = (att.baseUrl || '') + (att.key || '');
        
        if(!url) renderError('Invalid PDF link');
        else renderNote(title, date, url);
    }
}

loadData();
</script>
</body>
</html>
